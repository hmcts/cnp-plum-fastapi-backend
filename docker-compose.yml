services:
  fastapi-backend:
    build:
      context: .
      args:
        - http_proxy
        - https_proxy
        - no_proxy
    image: hmctsprod.azurecr.io/plum/fastapi-backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: rhubarbdb
      POSTGRES_USER: rhubarbuser
      POSTGRES_PASSWORD: rhubarbpassword
      POSTGRES_SSL_MODE: disable
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: rhubarbuser
      POSTGRES_PASSWORD: rhubarbpassword
      POSTGRES_DB: rhubarbdb
    ports:
      - 5460:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhubarbuser -d rhubarbdb"]
      interval: 5s
      timeout: 5s
      retries: 5
